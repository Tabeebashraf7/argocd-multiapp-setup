apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-app

  template:
    metadata:
      labels:
        app: user-app

    spec:
      containers:
      - name: user-container

        image: syedtabibashraf/user-service:v1

        ports:
        - containerPort: 8000
