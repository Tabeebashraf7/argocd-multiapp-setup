apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: product-app
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/Tabeebashraf7/argocd-multiapp-setup.git
    targetRevision: master
    path: k8s/product-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
